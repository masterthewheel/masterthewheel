<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Page Not Found | Master the Wheel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--orange:#f7581e;--heading:#161616;--body:#797979;--orange-grad:linear-gradient(rgb(255,137,98) 0%,rgb(248,101,52) 100%);--btn-shadow:rgba(248,101,52,.23) 0 .74px .74px -.95px,rgba(248,101,52,.22) 0 2.02px 2.02px -1.9px;--font:'Manrope',sans-serif}
    body{font-family:var(--font);background:#fcfcfc;color:var(--body);-webkit-font-smoothing:antialiased}
    .container{max-width:1300px;padding:0 40px;margin:0 auto}
    section{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 0}
    h1{font-size:120px;font-weight:700;letter-spacing:-.06em;color:var(--orange);line-height:1}
    h2{font-size:36px;font-weight:500;color:var(--heading);letter-spacing:-.04em;margin-bottom:16px;line-height:1.3}
    p{font-size:18px;color:var(--body);max-width:480px;margin:0 auto 36px;line-height:1.75}
    .btns{display:flex;gap:11px;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;height:52px;padding:0 26px;border-radius:99px;font-family:var(--font);font-size:15px;font-weight:600;text-decoration:none;transition:transform .22s}
    .btn-primary{background:var(--orange-grad);color:#fff;box-shadow:var(--btn-shadow)}
    .btn-primary:hover{transform:translateY(-2px)}
    .btn-secondary{background:#fff;color:var(--heading);border:1px solid #e8e8e8}
    .btn-secondary:hover{transform:translateY(-2px)}
    @media(max-width:760px){h1{font-size:80px}h2{font-size:28px}.container{padding:0 20px}}
  </style>
</head>
<body>
<section><div class="container">
  <h1>404</h1>
  <h2>Wrong Turn &mdash; But No Big Deal</h2>
  <p>The page you&rsquo;re looking for doesn&rsquo;t exist. Let&rsquo;s get you back on the road.</p>
  <div class="btns">
    <a href="index.html" class="btn btn-primary">Back to Home</a>
    <a href="courses.html" class="btn btn-secondary">View Courses</a>
  </div>
</div></section>
</body>
</html>
